name: Android Release Build

on:
  push:
    branches:
      - main # Trigger on pushes to your main branch

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial permission to allow creation of GitHub Releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # Change to '21' if your project uses newer Gradle versions

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: |
            Automated build for commit ${{ github.sha }}.
            Changelog: ${{ github.event.head_commit.message }}
          draft: false
          prerelease: false
          files: app/build/outputs/apk/debug/app-debug.apk
